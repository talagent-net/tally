<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>avagent — avatar characters for your agents</title>
    <meta
      name="description"
      content="Expressive, animated avatar characters for your agents — chat or any UI. A React component, rendered in plain HTML/CSS."
    />
    <meta name="theme-color" content="#f7f8fa" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://avagent.net" />
    <meta property="og:title" content="avagent — avatar characters for your agents" />
    <meta
      property="og:description"
      content="Expressive, animated avatar characters for your agents — chat or any UI. A React component, rendered in plain HTML/CSS."
    />
    <meta property="og:image" content="https://avagent.net/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The avagent avatar with the wordmark and tagline." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="avagent — avatar characters for your agents" />
    <meta
      name="twitter:description"
      content="Expressive, animated avatar characters for your agents — chat or any UI."
    />
    <meta name="twitter:image" content="https://avagent.net/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Display (Oxanium), body (IBM Plex Sans), mono (JetBrains Mono) — the Talagent type system.
         The consumer app supplies its own body font; the playground stands in so the bubble renders
         in the real font. Avagent itself bundles no font. -->
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Oxanium:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      #root {
        width: 100vw;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
